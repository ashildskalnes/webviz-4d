# Configuration file: config.yaml    
title: WebViz-4D QC                                

shared_settings: 
    config_version: 2.0 
    field_name: Johan Sverdrup  
    sumo:
        env_name: prod
        case_name: 25p0p3_histandpred_ff_16022025
        sumo_surfaces: True
    auto4d:
    osdu:
    fmu:
 
    label: Model 25.0.3 SUMO
    
    observed_maps: 
        realization_names: ["*"]                  
        iteration_names: [pred]                                   
        map_directories: [share/observations/maps/]   
        attributes: ["*"]
        surface_names: ["*"]
        time_intervals: ["*"]
   
    basic_well_layers: 
        planned: Planned wells  
        drilled_wells: Drilled wells                         
        reservoir_sections: Reservoir sections              
        #active_production: Producers - active                      
        #active_injection: Injectors - active                        
        
    additional_well_layers:      
        production: Producers                                     
        injection: Injectors                                
         
    well_folder: &wellfolder SMDA  
    top_reservoir: 
        name: Draupne Fm. 1 JS Top 
        tag_name: depth_structural_model 
        iter: pred
        real: realization-0     
        polygon_usage: 
            zones: True
            observed: True
            aggregated: True
    production_data: &production_data PDM 
    polygons_folder: &polygons_folder SUMO
    colormaps_folder: &colormaps_folder ../colormaps/
    settings_file: &settings ../settings.yaml
    interval_mode: &interval_mode normal
    default_interval: 2023-09-15-2020-10-01 
                
# ------------------------------ 
options:
  menu:
    show_logo: true
    bar_position: left
    drawer_position: left
    initially_pinned: true
    initially_collapsed: true

# ------------------------------
layout:
  - section: Webviz-4D TGX 
    content:
      # -----------------------------         
      - page: Front page 
        icon: home
        content:                  
          - Markdown: 
              markdown_file: ./front_page.md  
              
      # -------------------------------
      - group: Timelapse maps   
        icon: layers
        content:                     
          - page: Observed maps 
            content:  
              - SurfaceViewer4D:  
                  well_folder: *wellfolder
                  production_data: *production_data
                  colormaps_folder: *colormaps_folder
                  settings_file:  *settings
                  interval_mode: *interval_mode
                  selectors:
                    extraction_type: Surface attribute
                    strat_zone: Surface/Zone name
                    interval: Interval
                    content: Seismic
                    difference: Difference

                  map1_defaults:
                    data_source: sumo
                    map_type: observed
                    difference_type: AttributeOfDifference
                    coverage: Unknown
                    map_dim: 4D

                  map2_defaults:
                    data_source: sumo
                    map_type: observed
                    difference_type: AttributeOfDifference
                    coverage: Unknown
                    map_dim: 4D

                  map3_defaults:
                    data_source: sumo
                    map_type: observed
                    difference_type: AttributeOfDifference
                    coverage: Unknown
                    map_dim: 4D
              
      - group: Information
        icon: info_circle
        content:

          - page: How was this made
            content:
              - SyntaxHighlighter:
                  filename: ./sumo_config.yaml  
      
