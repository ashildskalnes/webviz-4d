# Configuration file: config.yaml    
title: WebViz-4D SUMO                                

shared_settings: 
    field_name: Troll  
    sumo:
        env_name: prod
        case_name: 24.0.0-20250127
        sumo_surfaces: True
    auto4d:
    osdu:
    fmu:
  
    label: Model 24.0.0 SUMO 
      
    observed_maps: 
        realization_names: ["*"]                  
        iteration_names: [pred]                                   
        map_directories: [share/observations/maps/]   
        attributes: ["*"]
        surface_names: ["*"]
        time_intervals: ["*"]
   
    basic_well_layers: 
        planned: Planned wells  
        drilled_wells: Drilled wells                         
        reservoir_sections: Reservoir sections              
        #active_production: Producers - active                      
        #active_injection: Injectors - active                        
        
    additional_well_layers:      
        production: Producers                                     
        injection: Injectors                                
         
    well_folder: &wellfolder SMDA  
    top_reservoir: 
        name: TopSO62 
        tag_name: DS_extract_GF_pass3_eroded
        iter: enif-1
        real: realization-0 
        polygon_usage: 
            zones: True
            observed: True
            aggregated: True
    production_data: &production_data PDM 
    polygons_folder: &polygons_folder SUMO
    colormaps_folder: &colormaps_folder ../colormaps/
    settings_file: &settings ../settings.yaml   
    interval_mode: &interval_mode normal
                
# ------------------------------ 
options:
  menu:
    show_logo: true
    bar_position: left
    drawer_position: left
    initially_pinned: true
    initially_collapsed: true

# ------------------------------
layout:
  - section: Webviz-4D TGX 
    content:
      # -----------------------------         
      - page: Front page 
        icon: home
        content:                  
          - Markdown: 
              markdown_file: ./front_page.md  
              
      # -------------------------------
      - group: Timelapse maps   
        icon: layers
        content:                     
          - page: Observed maps 
            content:
              - SurfaceViewer4D: 
                  well_folder: *wellfolder 
                  production_data: *production_data
                  colormaps_folder: *colormaps_folder
                  settings_file: *settings 
                  interval_mode: *interval_mode 
                  default_interval: 2001-07-01-1991-07-01                    
                   
                  map1_defaults: 
                    data_source: sumo
                    difference_type: AttributeOfDifference
                    coverage: Full  
                    attribute:  max              # Customize 
                    name: lay72                     # Customize  
                    map_type: observed                          # Customize
                    seismic: average_PRESSURE                            # Customize 
                    difference:  NotTimeshifted                # Customize     
                    interval: 2001-07-01-1991-07-01    
                  map2_defaults: 
                    data_source: sumo
                    difference_type: AttributeOfDifference
                    coverage: Full 
                    attribute: max              # Customize
                    name: lay72                          # Customize
                    map_type: observed                          # Customize
                    seismic: average_PRESSURE                            # Customize 
                    difference:  NotTimeshifted                # Customize     
                    interval: 2001-07-01-1991-07-01 
                  map3_defaults: 
                    data_source: sumo
                    difference_type: AttributeOfDifference
                    coverage: Full 
                    attribute: max              # Customize
                    name: lay72                          # Customize
                    map_type: observed                          # Customize
                    seismic: average_PRESSURE                            # Customize 
                    difference:  NotTimeshifted                # Customize     
                    interval: 2001-07-01-1991-07-01                           
              
 
      
